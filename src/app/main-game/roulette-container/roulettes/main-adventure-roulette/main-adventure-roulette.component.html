<h1 class="title">{{ 'game.main.roulette.adventure.title' | translate }}</h1>
<p class="respin-reason">{{ respinReason | translate}}</p>
<app-wheel  #wheel
            [items]="actions"
            (selectedItemEvent)="onItemSelected($event)">
</app-wheel>
<button type="button" class="btn btn-outline-secondary my-2" (click)="doNothingEvent.emit()">
    {{ 'game.main.roulette.adventure.actions.goStraight' | translate }}
</button>
