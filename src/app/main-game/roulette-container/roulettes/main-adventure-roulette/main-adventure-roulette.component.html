<div class="roulette-header">
    <h1 class="title">{{ 'game.main.roulette.adventure.title' | translate }}</h1>
    <p class="respin-reason">{{ respinReason | translate}}</p>
</div>
@if (isNewExperienceMode) {
    @if (stepType === 'reward') {
        <p class="choose-one-label">{{ 'game.main.roulette.adventure.chooseOne' | translate }}</p>
        <div class="adventure-card-row">
            @for (candidate of candidates; track candidate.id; let i = $index) {
                <button type="button" class="btn btn-outline-light adventure-card" [style.border-color]="candidate.fillStyle" (click)="onCandidatePicked(i)">
                    {{ candidate.textKey | translate }}
                </button>
            }
        </div>
    }
} @else {
    <app-wheel  #wheel
                [items]="actions"
                (selectedItemEvent)="onItemSelected($event)">
    </app-wheel>
}
<div class="roulette-action-row"></div>
