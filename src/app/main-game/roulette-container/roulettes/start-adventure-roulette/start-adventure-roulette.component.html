<div class="roulette-header"><h1 class="title">{{ 'game.main.roulette.start.title' | translate }}</h1></div>
<app-wheel  #wheel
            [items]="actions"
            (selectedItemEvent)="onItemSelected($event)">
</app-wheel>
<button type="button" class="btn btn-warning go-straight-button my-2 d-block mx-auto" [disabled]="wheel.spinning" (click)="doNothingEvent.emit()">
    {{ 'game.main.roulette.start.actions.goStraight' | translate }}
</button>
