<div class="roulette-header"><h1 class="title">{{ 'game.main.roulette.start.title' | translate }}</h1></div>
<app-wheel  #wheel
            [items]="actions"
            (selectedItemEvent)="onItemSelected($event)">
</app-wheel>
<div class="roulette-action-row">
    <button type="button" class="btn btn-warning go-straight-button" [disabled]="wheel.spinning" (click)="doNothingEvent.emit()">
        {{ 'game.main.roulette.start.actions.goStraight' | translate }}
    </button>
</div>
