@if (prepPhase) {
    <app-battle-prep-panel
        [team]="trainerTeam"
        [opponentTypes]="effectiveOpponentTypes"
        [items]="trainerItems"
        [forcedIndex]="markedTargetService.currentMarkedIndex"
        [baseNoCount]="baseNoCount"
        [currentRound]="currentRound"
        [eyebrowLabel]="'game.main.roulette.elite.eyebrow' | translate"
        [battleTitle]="'game.main.roulette.elite.title' | translate"
        [superEffectiveTypes]="matchupSuperEffectiveTypes"
        [resistTypes]="matchupResistTypes"
        [weakTypes]="matchupDisadvantageTypes"
        [advantageDelta]="matchupAdvantageDelta"
        [disadvantageDelta]="matchupDisadvantageDelta"
        (confirmed)="onPrepConfirmed($event)" />
} @else {
    <app-wheel
        #wheel
        [items]="victoryOdds"
        (selectedItemEvent)="onItemSelected($event)">
        <div wheel-card-header class="wheel-card-header">
            <h1 class="title">{{ 'game.main.roulette.elite.title' | translate }}</h1>
            <p class="respin-reason">{{ (retries > 0 && currentItem) ? (currentItem.text | translate)+" x"+retries : ""}}</p>
            @if (currentElite?.types?.length) {
                <app-matchup-strip
                    [opponentTypes]="effectiveOpponentTypes ?? []"
                    [superEffectiveTypes]="matchupSuperEffectiveTypes"
                    [resistTypes]="matchupResistTypes"
                    [weakTypes]="matchupDisadvantageTypes"
                    [advantageDelta]="matchupAdvantageDelta"
                    [disadvantageDelta]="matchupDisadvantageDelta"
                    [odds]="currentOdds" />
            }
        </div>
    </app-wheel>
}
<div class="roulette-action-row"></div>
