<div class="item-box" [ngClass]="isDark ? 'panel-dark' : 'panel-light'">
    <h2 class="title">{{ 'items.title' | translate }}</h2>
    <div class="categories-grid">
        @for (category of categories; track category.id) {
            <div class="category-cell">
                <div class="category-label">{{ category.labelKey | translate }}</div>
                <div class="category-items">
                    @for (entry of category.entries; track entry.index) {
                        <div class="item-tile-wrap">
                            <button type="button"
                                    class="item-tile"
                                    (mouseenter)="setHoveredItem(entry.index)"
                                    (mouseleave)="setHoveredItem(null)"
                                    (click)="useItem(entry.item)">
                                @if (isCapsule(entry.item)) {
                                    <span class="capsule-glyph" [style.background]="getCapsuleGlyphBackground(entry.item)"></span>
                                } @else {
                                    <img [src]="getItemSprite(entry.item)"
                                         class="item-sprite"
                                         [alt]="getItemName(entry.item)"
                                         (error)="onSpriteError($event)">
                                }
                            </button>
                            @if (hoveredItemIndex === entry.index) {
                                <div class="item-popover">
                                    <div class="item-popover-name">{{ getItemName(entry.item) }}</div>
                                    <div class="item-popover-desc">{{ getItemDescription(entry.item) }}</div>
                                </div>
                            }
                        </div>
                    }
                </div>
            </div>
        }
    </div>
</div>
