<div class="badges-wrap">
    <button type="button"
            class="badges-toggle"
            [class.badges-toggle-empty]="!trainerBadges?.length"
            (click)="toggleExpanded()"
            [attr.aria-expanded]="expanded"
            [attr.aria-label]="'trainer.team.badgesAriaLabel' | translate">
        @for (earned of badgeSlots; track $index) {
            <span class="badge-dot" [class.badge-dot-earned]="earned"></span>
        }
    </button>
    @if (expanded) {
        <div class="badges-popover">
            @for (badge of trainerBadges; track badge.name) {
                <div class="badge-popover-entry">
                    <img [src]="badge.sprite" [alt]="badge.name | translate" class="badge-popover-sprite">
                    <span class="badge-popover-name">{{ badge.name | translate }}</span>
                </div>
            }
        </div>
    }
</div>
