<button type="button" class="panel-pill-btn" (click)="openPokedex()">
  <ng-icon name="bootstrapBook"></ng-icon>
  {{ 'pokedex.button' | translate }}
</button>

<ng-template #pokedexModal let-modal>
  <div class="modal-body pokedex-card-body">
    <div class="pokedex-header">
      <h2 class="pokedex-title">{{ 'pokedex.title' | translate }}</h2>
      <button type="button" class="pokedex-close" (click)="closeModal()" aria-label="Close">×</button>
    </div>

    <div class="pokedex-tabs">
      <button type="button" class="pokedex-tab" [class.pokedex-tab-active]="activeTab === 'local'"
              (click)="setActiveTab('local')">
        {{ 'pokedex.tab.local' | translate: { region: currentRegion } }}
      </button>
      <button type="button" class="pokedex-tab" [class.pokedex-tab-active]="activeTab === 'national'"
              (click)="setActiveTab('national')">
        {{ 'pokedex.tab.national' | translate }}
      </button>
    </div>

    <div class="pokedex-caught-row">
      <span>{{ 'pokedex.caught' | translate }}</span>
      <span>{{ caughtCount }} / {{ totalCount }}</span>
    </div>

    <input type="text" class="pokedex-search"
           [(ngModel)]="searchTerm"
           [placeholder]="'pokedex.search' | translate">

    <div class="pokedex-grid">
      @for (id of filteredIds; track id) {
        <app-pokedex-entry
          [pokemonId]="id"
          [entry]="$safeNavigationMigration(pokedexData?.caught?.[id.toString()])"
          (entryClicked)="onEntryClicked($event)">
        </app-pokedex-entry>
      }
    </div>
  </div>
</ng-template>
