<div class="wheel-container">
    <p aria-live="polite">{{ currentSegment | translate }}</p>
    <div class="canvas-container">
        <canvas id="wheel"
                #wheel
                [width]="wheelWidth"
                [height]="canvasHeight"
                [attr.aria-label]="'wheel.spin' | translate"
                (click)="spinWheel()">
        </canvas>
        <canvas id="pointer"
                #pointer
                [width]="cursorWidth"
                [height]="canvasHeight">
        </canvas>
    </div>
    <button class="btn spin-button my-3"
            [ngClass]="(darkMode | async) ? 'btn-light' : 'btn-dark'"
            (click)="spinWheel()">
            {{ 'wheel.spin' | translate }}
    </button>
</div>
