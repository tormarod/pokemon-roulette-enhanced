<div class="pokedex-cell clickable"
     [class.won]="isWon"
     [class.not-captured]="!isCaptured"
     [class.dark-cell]="(darkMode | async) === true"
     [class.light-cell]="(darkMode | async) !== true"
     [ngbTooltip]="pokemonText | translate"
     placement="bottom"
     (click)="onCellClick()">

  @if (spriteUrl) {
    <img [src]="spriteUrl"
         loading="lazy"
         class="cell-img"
         alt="Pokémon sprite">
  }
  <span class="number-badge">{{ formatPokemonNumber(pokemonId) }}</span>
</div>
