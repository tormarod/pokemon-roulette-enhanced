<div class="row">
    <div class="col-12 col-sm-2">
      <div class="row py-4">
            <div class="col-6 col-sm-12 mb-2">
                <app-main-game-button></app-main-game-button>
            </div>
      </div>
    </div>
    <div class="col-12 col-sm-9">
        <div class="container text-center">
            <div class="mt-2 mb-4">
                <h3>
                    <ng-icon name="bootstrapGear"></ng-icon> {{ 'settings.label' | translate }} <ng-icon name="bootstrapGear"></ng-icon>
                </h3>
            </div>
            <div class="d-flex justify-content-center">
                <div class="row g-3" style="max-width: 500px;">
                    <div class="col-12">
                        <div class="form-switch">
                            <app-theme-selector></app-theme-selector>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label text-start">{{ 'settings.defaultGender.title' | translate }}</label>
                            <div class="d-flex flex-column gap-2">
                                <div class="form-check">
                                    <input 
                                        class="form-check-input" 
                                        type="radio" 
                                        name="genderOptions"
                                        [value]="'male'"
                                        [checked]="(settings$ | async)?.defaultGender === 'male'"
                                        (change)="onSelectGender('male')"
                                        id="maleOption">
                                    <label class="form-check-label" for="maleOption">
                                        {{ 'settings.defaultGender.male' | translate }}
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input 
                                        class="form-check-input" 
                                        type="radio" 
                                        name="genderOptions"
                                        [value]="'female'"
                                        [checked]="(settings$ | async)?.defaultGender === 'female'"
                                        (change)="onSelectGender('female')"
                                        id="femaleOption">
                                    <label class="form-check-label" for="femaleOption">
                                        {{ 'settings.defaultGender.female' | translate }}
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input 
                                        class="form-check-input" 
                                        type="radio" 
                                        name="genderOptions"
                                        [value]="'always-choose'"
                                        [checked]="(settings$ | async)?.defaultGender === 'always-choose'"
                                        (change)="onSelectGender('always-choose')"
                                        id="alwaysChooseOption">
                                    <label class="form-check-label" for="alwaysChooseOption">
                                        {{ 'settings.defaultGender.always-choose' | translate }}
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="explanationsSwitch">
                                {{ 'settings.explanations' | translate }}
                            </label>
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                [checked]="$safeNavigationMigration((settings$ | async)?.lessExplanations)" 
                                (change)="onToggleVerbosity()"
                                id="explanationsSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="muteAudioSwitch">
                                {{ 'settings.muteAudio' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="$safeNavigationMigration((settings$ | async)?.muteAudio)"
                                (change)="onToggleMuteAudio()"
                                id="muteAudioSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between align-items-center">
                            <label class="form-check-label" for="volumeSlider">
                                {{ 'settings.volume' | translate }}
                            </label>
                            <input
                                class="form-range w-50"
                                type="range"
                                min="0"
                                max="1"
                                step="0.05"
                                [value]="$safeNavigationMigration((settings$ | async)?.volume)"
                                (input)="onVolumeChange($any($event.target).value)"
                                id="volumeSlider">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="skipShinySwitch">
                                {{ 'settings.skipShinyRolls' | translate }}
                            </label>
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                [checked]="$safeNavigationMigration((settings$ | async)?.skipShinyRolls)" 
                                (change)="onToggleSkipShinyRolls()"
                                id="skipShinySwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="skipMegaAnimationSwitch">
                                {{ 'settings.skipMegaEvolutionAnimation' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="$safeNavigationMigration((settings$ | async)?.skipMegaEvolutionAnimation)"
                                (change)="onToggleSkipMegaEvolutionAnimation()"
                                id="skipMegaAnimationSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="fastSpinSwitch">
                                {{ 'settings.fastSpin' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="$safeNavigationMigration((settings$ | async)?.fastSpin)"
                                (change)="onToggleFastSpin()"
                                id="fastSpinSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label text-start" for="newExperienceModeSwitch">
                                {{ 'settings.newExperienceMode.title' | translate }}
                                <div class="small text-muted">{{ 'settings.newExperienceMode.description' | translate }}</div>
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="$safeNavigationMigration((settings$ | async)?.newExperienceMode)"
                                (change)="onToggleNewExperienceMode()"
                                id="newExperienceModeSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <app-language-selector></app-language-selector>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-outline-secondary w-100" (click)="openWhatsNew()">
                            {{ 'whatsNew.settingsEntry' | translate }}
                        </button>
                    </div>
                    <div class="col-12">
                        <app-restart-game-button (restartEvent)="onRestartGame()"></app-restart-game-button>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
